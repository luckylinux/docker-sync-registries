version: "3.8"
services:
  docker-sync-registries:
    #image: localhost:5000/local/"${LOCAL_APPS_CONTAINER_IMAGE}"
    image: localhost:5000/local/docker-sync-registries:debian-latest
    pull_policy: "missing"
    #container_name: ${LOCAL_APPS_CONTAINER_NAME}
    container_name: docker-sync-registries
    env_file:
      - .env
    environment:
      - "CONFIG_BASE_PATH=/etc/sync-registries.d"
      - "LOCAL_APPS_RUN_INSIDE_CONTAINER=false"
      - "ENABLE_INFINITE_LOOP=true"
      # - "DEBUG_LIST_PARSED_CONFIG=true"

      # Define which Synchronization Tool to use
      # Options are:
      # - "skopeo" (default)
      # - "regctl"
      # - "crane"
      - "SYNC_TOOL=skopeo"

      # Synchronize Images every 1 Hour (3600 s)
      - "SYNC_INTERVAL=3600"

      # Synchronize Images every 2 Hours (7200 s)
      # - "SYNC_INTERVAL=7200"

      # Synchronize Images every 6 Hours (21600 s)
      # - "SYNC_INTERVAL=21600"

      # Add a Random Delay
      - "SYNC_RANDOM_OFFSET_MAX=3600"

      # Make Sure that Regctl loads the configuration
      - "REGCTL_CONFIG=/etc/regctl/config.json"

      # Enable Docker Hub Mirror using mirror.gcr.io
      - "ENABLE_DOCKER_HUB_MIRROR=true"

    volumes:
      - ./regctl:/etc/regctl:rw,z
      - ./containers:/etc/containers:rw,z
      - ./supercronic:/etc/supercronic:ro,z
      - ./sync.d:/etc/sync-registries.d:ro,z
      - ./data:/var/lib/sync-registries:rw,z

      # Testing latest Source Code Version
      - ./app/sync.py:/opt/app/sync.py:ro,z

    tmpfs:
      - /var/run:rw,size=33554432,mode=1777

    restart: "unless-stopped"
    # Needed to redirect log
    privileged: true
    networks:
      - podman

networks:
  podman:
    external: true
